<script>
/**
 * ============================================================
 * VERTHO APP — API Client
 * ============================================================
 * Wrapper com Promises sobre google.script.run
 * Toda comunicação com o server passa por aqui.
 * ============================================================
 */

// GAS URL for API calls (set by Worker or by GAS template)
var GAS_API_URL = (typeof VERTHO_GAS_URL !== 'undefined') ? VERTHO_GAS_URL : '';

var API = {

  _addTestEmail: function(params) {
    if (typeof App !== 'undefined' && App._email) {
      params._testEmail = App._email;
    } else if (typeof APP_TEST_EMAIL !== 'undefined' && APP_TEST_EMAIL) {
      params._testEmail = APP_TEST_EMAIL;
    }
    return params;
  },

  /**
   * Chamada principal — detecta se está no Worker (fetch) ou no GAS (google.script.run)
   */
  call: function(action, params) {
    params = API._addTestEmail(params || {});

    // Modo Worker: usa fetch ao GAS via GET
    if (GAS_API_URL) {
      return API._fetchGAS(action, params);
    }

    // Modo GAS: usa google.script.run
    return API._gasRun(action, params);
  },

  /**
   * Fetch via Worker → GAS GET
   */
  _fetchGAS: function(action, params) {
    return new Promise(function(resolve, reject) {
      var encodedParams = encodeURIComponent(JSON.stringify(params));
      var url = GAS_API_URL + '?view=appapi&action=' + encodeURIComponent(action) + '&params=' + encodedParams;

      fetch(url, { redirect: 'follow' })
        .then(function(r) { return r.text(); })
        .then(function(text) {
          var response;
          try { response = JSON.parse(text); } catch(e) {
            // GAS pode retornar HTML wrapper — tentar extrair JSON
            var match = text.match(/\{[\s\S]*"success"[\s\S]*\}/);
            if (match) { try { response = JSON.parse(match[0]); } catch(e2) {} }
          }
          if (!response) {
            reject({ error: 'PARSE', message: 'Resposta inválida do servidor' });
            return;
          }
          if (response.success) {
            resolve(response.data);
          } else {
            if (response.error === 'AUTH_REQUIRED') {
              Toast.show('Sessão expirada.', 'error');
              setTimeout(function() { App.logout(); }, 1500);
              return;
            }
            reject(response);
          }
        })
        .catch(function(err) {
          console.error('API fetch error:', action, err);
          reject({ error: 'NETWORK', message: err.message || 'Erro de conexão' });
        });
    });
  },

  /**
   * Modo GAS: google.script.run
   */
  _gasRun: function(action, params) {
    return new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            resolve(response.data);
          } else {
            var error = response || { error: 'UNKNOWN', message: 'Resposta vazia' };
            if (error.error === 'AUTH_REQUIRED') {
              Toast.show('Sessão expirada.', 'error');
              setTimeout(function() { App.logout(); }, 1500);
              return;
            }
            reject(error);
          }
        })
        .withFailureHandler(function(err) {
          console.error('API failure:', action, err);
          reject({ error: 'NETWORK', message: err.message || 'Erro de conexão' });
        })
        .appApi(action, params);
    });
  },
  
  /**
   * Atalho para getSessionUser (chamado no boot)
   */
  getUser: function() {
    return new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            resolve(response.user);
          } else {
            reject(response);
          }
        })
        .withFailureHandler(function(err) {
          reject({ error: 'NETWORK', message: err.message });
        })
        .getSessionUser();
    });
  }
};


/**
 * Toast notifications
 */
var Toast = {
  show: function(msg, type) {
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'toast' + (type ? ' ' + type : '');
    toast.textContent = msg;
    container.appendChild(toast);
    
    setTimeout(function() {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(function() { toast.remove(); }, 300);
    }, 3000);
  }
};
</script>
