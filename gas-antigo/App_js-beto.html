<script>
/**
 * ============================================================
 * VERTHO APP — BETO (Mentor IA) Chat Module
 * ============================================================
 * Gerencia o overlay do chat com o BETO.
 * Suporta diferentes contextos (geral, PDI, tira-dúvida, simulação).
 * ============================================================
 */

var BETO = {
  _isOpen: false,
  _context: 'geral',
  _messages: [],
  
  /**
   * Abre/fecha o chat
   * @param {string} context - Contexto opcional (geral, pdi, tiraDuvida, simulacao)
   */
  toggle: function(context) {
    if (context && !this._isOpen) {
      this._context = context;
    }
    
    this._isOpen = !this._isOpen;
    var overlay = document.getElementById('beto-overlay');
    var fab = document.getElementById('beto-fab');
    
    if (this._isOpen) {
      overlay.style.display = 'flex';
      fab.style.display = 'none';
      
      // Se é primeira abertura, mostra mensagem de boas-vindas
      if (this._messages.length === 0) {
        this._addBotMessage(this._getWelcomeMessage());
      }
      
      // Foca no input
      setTimeout(function() {
        document.getElementById('beto-input').focus();
      }, 300);
    } else {
      overlay.style.display = 'none';
      fab.style.display = 'flex';
    }
  },
  
  /**
   * Envia mensagem do usuário
   */
  send: function() {
    var input = document.getElementById('beto-input');
    var msg = input.value.trim();
    if (!msg) return;
    
    input.value = '';
    
    // Mostra mensagem do user
    this._addUserMessage(msg);
    
    // Mostra typing
    var typingId = this._addBotMessage('Pensando...', true);
    
    // Chama API
    var self = this;
    API.call('beto.enviar', {
      mensagem: msg,
      contexto: this._context,
      historico: this._messages.map(function(m) { return { role: m.isBot ? 'assistant' : 'user', content: m.text }; })
    }).then(function(data) {
      // Remove typing e mostra resposta
      self._removeMessage(typingId);
      self._addBotMessage(data.resposta || 'Desculpe, tive um problema. Tente novamente.');
    }).catch(function(err) {
      self._removeMessage(typingId);
      self._addBotMessage('Houve um erro na conexão. Tente novamente em instantes.');
    });
  },
  
  // ─── INTERNOS ──────────────────────────────────
  
  _addUserMessage: function(text) {
    var id = 'msg-' + Date.now();
    this._messages.push({ id: id, role: 'user', text: text });
    this._appendMessageDOM(id, text, 'user');
    this._scrollToBottom();
    return id;
  },
  
  _addBotMessage: function(text, isTyping) {
    var id = 'msg-' + Date.now() + '-bot';
    this._messages.push({ id: id, role: 'bot', text: text });
    this._appendMessageDOM(id, text, 'bot', isTyping);
    this._scrollToBottom();
    return id;
  },
  
  _removeMessage: function(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
    this._messages = this._messages.filter(function(m) { return m.id !== id; });
  },
  
  _appendMessageDOM: function(id, text, role, isTyping) {
    var container = document.getElementById('beto-messages');
    var div = document.createElement('div');
    div.id = id;
    div.className = 'beto-msg ' + role + (isTyping ? ' typing' : '');
    div.textContent = text;
    container.appendChild(div);
  },
  
  _scrollToBottom: function() {
    var container = document.getElementById('beto-messages');
    setTimeout(function() {
      container.scrollTop = container.scrollHeight;
    }, 50);
  },
  
  _getWelcomeMessage: function() {
    var user = State.get('user') || {};
    var nome = user.nome ? user.nome.split(' ')[0] : 'educador';
    
    var msgs = {
      'geral': 'Olá, ' + nome + '! Sou o BETO, seu mentor de desenvolvimento. Como posso te ajudar hoje?',
      'pdi': 'Vamos falar sobre seu plano de desenvolvimento? Posso te ajudar a priorizar ações ou esclarecer qualquer ponto do seu PDI.',
      'tiraDuvida': 'Pode perguntar! Vou responder com base nos conteúdos da sua jornada. O que precisa saber?',
      'simulacao': 'Vamos praticar? Posso simular uma conversa difícil, um momento de feedback ou qualquer situação do seu dia a dia profissional.'
    };
    
    return msgs[this._context] || msgs.geral;
  }
};
</script>
