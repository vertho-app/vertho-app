name: TypeScript

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Security tests + service-role guard
        run: npm run test:unit

      - name: Report result
        if: failure()
        run: echo "::error::TypeScript check or security tests failed. Run 'npm run typecheck' and 'npm run test:unit' locally to see errors."
