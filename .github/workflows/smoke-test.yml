name: Smoke Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    name: Smoke Test (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel deploy
        if: github.event_name == 'push'
        run: sleep 90

      - name: Run smoke test
        run: node scripts/smoke-test.js https://vertho.com.br

      - name: Report result
        if: failure()
        run: echo "::error::Smoke test failed! Check route availability."
