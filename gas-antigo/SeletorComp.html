<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --navy: #0f2b54;
    --blue: #1a56db;
    --sky:  #3b82f6;
    --bg:   #f4f7fb;
    --white:#ffffff;
    --line: #e2e8f0;
    --txt:  #1e293b;
    --muted:#64748b;
    --green:#16a34a;
    --warn: #d97706;
    --radius:8px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Google Sans',Roboto,sans-serif;
    font-size:13px;
    color:var(--txt);
    background:var(--bg);
    padding:16px;
    min-width:520px;
  }

  /* ── Header ── */
  .header {
    background:var(--navy);
    color:#fff;
    border-radius:var(--radius);
    padding:12px 16px;
    margin-bottom:16px;
  }
  .header h2 { font-size:15px; font-weight:700; margin-bottom:2px; }
  .header p  { font-size:11px; opacity:.75; }

  /* ── Filtros ── */
  .filters {
    display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;
  }
  .filter-group {
    display:flex; flex-direction:column; gap:3px; flex:1; min-width:200px;
  }
  .filter-group label {
    font-size:10px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px;
  }
  .filter-group select {
    padding:6px 10px; border-radius:6px; font-size:12px;
    border:1.5px solid var(--line); background:var(--white);
    color:var(--txt); cursor:pointer;
  }
  .filter-group select:focus { border-color:var(--sky); outline:none; }

  /* ── Cargo tabs ── */
  .cargo-tabs {
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;
  }
  .cargo-tab {
    padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
    cursor:pointer; border:1.5px solid var(--line); background:var(--white);
    color:var(--muted); transition:all .15s;
  }
  .cargo-tab.active {
    background:var(--navy); color:#fff; border-color:var(--navy);
  }
  .cargo-tab .cnt {
    display:inline-block; background:rgba(255,255,255,.25);
    border-radius:10px; padding:0 5px; font-size:10px; margin-left:4px;
  }
  .cargo-tab:not(.active) .cnt {
    background:var(--blue); color:#fff;
  }

  /* ── Competência card ── */
  .comp-list { display:flex; flex-direction:column; gap:8px; }
  .comp-card {
    background:var(--white); border:1.5px solid var(--line);
    border-radius:var(--radius); padding:10px 12px;
    cursor:pointer; transition:border-color .15s, background .15s;
    display:flex; gap:10px; align-items:flex-start;
  }
  .comp-card:hover { border-color:var(--sky); }
  .comp-card.selected {
    border-color:var(--blue);
    background:#eff6ff;
  }
  .comp-card .chk {
    width:18px; height:18px; border-radius:4px;
    border:2px solid var(--line); flex-shrink:0; margin-top:1px;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s;
  }
  .comp-card.selected .chk {
    background:var(--blue); border-color:var(--blue); color:#fff;
    font-size:11px;
  }
  .comp-card .info { flex:1; }
  .comp-card .comp-id {
    font-size:10px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px;
  }
  .comp-card .comp-nome {
    font-size:13px; font-weight:600; color:var(--navy); margin:2px 0 4px;
  }
  .comp-card .comp-just {
    font-size:11px; color:var(--muted); line-height:1.5;
  }
  .comp-card .comp-just.collapsed {
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .comp-card .comp-escola {
    font-size:10px; color:var(--sky); margin-top:3px;
  }

  /* ── Info box ── */
  .info-box {
    background:#fefce8; border:1px solid #fde68a; border-radius:var(--radius);
    padding:8px 12px; margin-bottom:12px; font-size:11px; color:#92400e;
    display:none;
  }

  /* ── Footer ── */
  .footer {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:16px; padding-top:12px; border-top:1px solid var(--line);
  }
  .sel-count { font-size:12px; color:var(--muted); }
  .sel-count strong { color:var(--navy); }
  .btn-group { display:flex; gap:8px; }
  button {
    padding:7px 16px; border-radius:6px; font-size:12px; font-weight:600;
    cursor:pointer; border:none; transition:opacity .15s;
  }
  button:hover { opacity:.85; }
  .btn-cancel { background:var(--line); color:var(--muted); }
  .btn-confirm { background:var(--blue); color:#fff; }
  .btn-confirm:disabled { background:var(--muted); cursor:not-allowed; opacity:.6; }

  /* ── Toast ── */
  .toast {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff; padding:8px 16px; border-radius:20px;
    font-size:12px; opacity:0; transition:opacity .3s; pointer-events:none;
  }
  .toast.show { opacity:1; }

  .saved-badge {
    display:inline-block; background:#dcfce7; color:var(--green);
    border-radius:10px; padding:2px 8px; font-size:10px; font-weight:600;
    margin-left:6px; vertical-align:middle;
  }
</style>
</head>
<body>

<div class="header">
  <h2>🎯 Selecionar Competências para Workshop</h2>
  <p>Filtre por cargo e escola, depois marque as competências que entrarão no diagnóstico</p>
</div>

<div class="filters">
  <div class="filter-group">
    <label>Cargo</label>
    <select id="filtroCargo" onchange="onCargoChange()">
      <option value="" disabled selected>Selecione o cargo</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Escola</label>
    <select id="filtroEscola" onchange="onEscolaChange()">
      <option value="__todas__">Todas (comuns a todas)</option>
    </select>
  </div>
</div>

<div class="info-box" id="infoBox"></div>

<div class="cargo-tabs" id="cargoTabs"></div>
<div class="comp-list"  id="compList"></div>

<div class="footer">
  <div class="sel-count" id="selCount">Selecione as competências</div>
  <div class="btn-group">
    <button class="btn-cancel" onclick="google.script.host.close()">Fechar</button>
    <button class="btn-confirm" id="btnSalvar" onclick="salvar(false)" style="background:#16a34a">💾 Salvar</button>
    <button class="btn-confirm" id="btnConfirm" onclick="salvar(true)">✓ Salvar e Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var dados = [];          // array do backend
  var cargos = [];         // nomes únicos de cargos
  var escolas = [];        // nomes únicos de escolas
  var dadosFiltrados = []; // dados após aplicar filtros
  var cargoAtual = 0;

  // ── Receber dados do backend ──
  google.script.run
    .withSuccessHandler(function(d) {
      dados = d;
      extrairFiltros();
      // Auto-selecionar primeiro cargo se existe
      var selC = document.getElementById('filtroCargo');
      if (selC.options.length > 1) {
        selC.selectedIndex = 1; // primeiro cargo real (pula "Selecione")
        onCargoChange();
      }
    })
    .withFailureHandler(function(e) {
      document.getElementById('compList').innerHTML =
        '<p style="color:red;padding:16px">Erro: ' + e.message + '</p>';
    })
    .carregarDadosSeletorComp();

  // ── Extrair listas de cargos e escolas ──
  function extrairFiltros() {
    var mapCargo = {};
    dados.forEach(function(c) {
      if (c.cargoNome) mapCargo[c.cargoNome] = true;
    });
    cargos = Object.keys(mapCargo).sort();

    var selCargo = document.getElementById('filtroCargo');
    cargos.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      selCargo.appendChild(opt);
    });

    // Se só tem 1 cargo, auto-selecionar
    if (cargos.length === 1) {
      selCargo.value = cargos[0];
    }
  }

  // ── Atualizar dropdown de escolas baseado no cargo selecionado ──
  function atualizarEscolas() {
    var fCargo = document.getElementById('filtroCargo').value;
    var selEscola = document.getElementById('filtroEscola');

    // Limpar opções existentes
    selEscola.innerHTML = '<option value="__todas__">Todas (comuns a todas)</option>';

    // Coletar escolas do cargo selecionado
    var mapEscola = {};
    dados.forEach(function(c) {
      if (!fCargo || c.cargoNome === fCargo) {
        if (c.escola) mapEscola[c.escola] = true;
      }
    });
    escolas = Object.keys(mapEscola).sort();

    escolas.forEach(function(e) {
      var opt = document.createElement('option');
      opt.value = e; opt.textContent = e;
      selEscola.appendChild(opt);
    });

    // Se só tem 1 escola, auto-selecionar
    if (escolas.length === 1) {
      selEscola.value = escolas[0];
    }
  }

  // ── Handlers dos filtros ──
  function onCargoChange() {
    atualizarEscolas();
    filtrarERenderizar();
  }

  function onEscolaChange() {
    filtrarERenderizar();
  }

  // ── Aplicar filtros (chamado internamente) ──
  function filtrarERenderizar() {
    var fCargo = document.getElementById('filtroCargo').value;
    var fEscola = document.getElementById('filtroEscola').value;
    var info = document.getElementById('infoBox');

    // Cargo obrigatório
    if (!fCargo) {
      document.getElementById('cargoTabs').innerHTML = '';
      document.getElementById('compList').innerHTML =
        '<p style="color:var(--muted);padding:16px;text-align:center">Selecione um cargo para ver as competências.</p>';
      return;
    }

    dadosFiltrados = dados.filter(function(c) {
      if (fCargo && c.cargoNome !== fCargo) return false;
      if (fEscola && fEscola !== '__todas__' && c.escola !== fEscola) return false;
      return true;
    });

    // Modo "Todas": mostrar só competências comuns a TODAS as escolas do cargo filtrado
    if (fEscola === '__todas__' && dadosFiltrados.length > 1) {
      var porCargo = {};
      dadosFiltrados.forEach(function(c) {
        if (!porCargo[c.cargoNome]) porCargo[c.cargoNome] = [];
        porCargo[c.cargoNome].push(c);
      });

      var merged = [];
      Object.keys(porCargo).forEach(function(cargo) {
        var group = porCargo[cargo];
        if (group.length <= 1) { merged.push(group[0]); return; }

        // Interseção de competências (presentes em TODAS as escolas)
        var compSets = group.map(function(g) {
          var ids = {};
          g.comps.forEach(function(c) { ids[c.id] = c; });
          return ids;
        });
        var comuns = [];
        var firstSet = compSets[0];
        Object.keys(firstSet).forEach(function(id) {
          var emTodas = compSets.every(function(s) { return s[id]; });
          if (emTodas) comuns.push(firstSet[id]);
        });

        if (comuns.length > 0) {
          // Merge seleções de todas as escolas
          var selMerge = [];
          group.forEach(function(g) {
            g.selecao.forEach(function(s) {
              if (selMerge.indexOf(s) < 0) selMerge.push(s);
            });
          });
          merged.push({
            cargo: cargo + ' — Todas as escolas',
            cargoNome: cargo,
            escola: '__todas__',
            rowIndices: group.map(function(g) { return g.rowIndex; }),
            comps: comuns,
            selecao: selMerge,
            salvo: group.some(function(g) { return g.salvo; })
          });
        }
      });

      if (merged.length > 0) {
        dadosFiltrados = merged;
        info.textContent = '⚡ Modo "Todas": mostrando ' + merged[0].comps.length + ' competências comuns a todas as escolas';
        info.style.display = 'block';
      }
    } else {
      info.style.display = 'none';
    }

    cargoAtual = 0;
    renderTabs();
    renderComps(0);
  }

  // ── Tabs de cargo ──
  function renderTabs() {
    if (dadosFiltrados.length === 0) {
      document.getElementById('cargoTabs').innerHTML = '';
      document.getElementById('compList').innerHTML =
        '<p style="color:var(--muted);padding:16px;text-align:center">Nenhum cargo encontrado com os filtros selecionados.<br>Rode a IA 1 primeiro.</p>';
      return;
    }
    var html = '';
    dadosFiltrados.forEach(function(c, i) {
      var cnt  = c.selecao.length;
      var saved = c.salvo ? '<span class="saved-badge">✓ salvo</span>' : '';
      html += '<div class="cargo-tab' + (i===0?' active':'') +
              '" onclick="trocarCargo(' + i + ')" id="tab' + i + '">' +
              c.cargo + saved +
              '<span class="cnt">' + cnt + '</span></div>';
    });
    document.getElementById('cargoTabs').innerHTML = html;
  }

  function trocarCargo(i) {
    document.querySelectorAll('.cargo-tab').forEach(function(t,j){
      t.classList.toggle('active', j===i);
    });
    cargoAtual = i;
    renderComps(i);
  }

  // ── Lista de competências ──
  function renderComps(i) {
    if (!dadosFiltrados[i]) {
      document.getElementById('compList').innerHTML = '';
      return;
    }
    var cargo = dadosFiltrados[i];
    var html  = '';
    cargo.comps.forEach(function(comp) {
      var sel  = cargo.selecao.indexOf(comp.id) >= 0;
      var just = comp.just || '';
      var escolaTag = comp.escola ? '<div class="comp-escola">📍 ' + comp.escola + '</div>' : '';
      html += '<div class="comp-card' + (sel?' selected':'') +
              '" onclick="toggleComp(\'' + comp.id + '\')" id="card' + comp.id + '">' +
              '<div class="chk">' + (sel?'✓':'') + '</div>' +
              '<div class="info">' +
              '<div class="comp-id">' + comp.id + '</div>' +
              '<div class="comp-nome">' + comp.nome + '</div>' +
              '<div class="comp-just collapsed">' + just + '</div>' +
              escolaTag +
              '</div></div>';
    });
    document.getElementById('compList').innerHTML = html;
    atualizarContador();
  }

  // ── Toggle seleção ──
  function toggleComp(id) {
    var sel = dadosFiltrados[cargoAtual].selecao;
    var idx = sel.indexOf(id);
    if (idx >= 0) sel.splice(idx, 1);
    else          sel.push(id);
    var card = document.getElementById('card' + id);
    card.classList.toggle('selected', idx < 0);
    card.querySelector('.chk').textContent = idx < 0 ? '✓' : '';
    var tab = document.getElementById('tab' + cargoAtual);
    tab.querySelector('.cnt').textContent = sel.length;
    atualizarContador();
  }

  function atualizarContador() {
    if (!dadosFiltrados[cargoAtual]) return;
    var sel  = dadosFiltrados[cargoAtual].selecao;
    var nome = dadosFiltrados[cargoAtual].cargo;
    var el   = document.getElementById('selCount');
    el.innerHTML = '<strong>' + sel.length + '</strong> selecionadas para <strong>' + nome + '</strong>';
    document.getElementById('btnConfirm').disabled = false;
  }

  // ── Salvar ──
  function salvar(fecharAposSalvar) {
    var payload = dadosFiltrados.map(function(c) {
      if (c.rowIndices) {
        return c.rowIndices.map(function(ri) {
          return { rowIndex: ri, ids: c.selecao };
        });
      }
      return [{ rowIndex: c.rowIndex, ids: c.selecao }];
    });
    var flat = [];
    payload.forEach(function(arr) {
      arr.forEach(function(item) { flat.push(item); });
    });

    document.getElementById('btnSalvar').disabled = true;
    document.getElementById('btnConfirm').disabled = true;
    document.getElementById('btnSalvar').textContent = '⏳ Salvando...';
    google.script.run
      .withSuccessHandler(function() {
        dadosFiltrados.forEach(function(c) { c.salvo = true; });
        renderTabs();
        showToast('✅ Competências salvas!');
        document.getElementById('btnSalvar').disabled = false;
        document.getElementById('btnConfirm').disabled = false;
        document.getElementById('btnSalvar').textContent = '💾 Salvar';
        if (fecharAposSalvar) {
          setTimeout(function() { google.script.host.close(); }, 800);
        }
      })
      .withFailureHandler(function(e) {
        showToast('❌ Erro: ' + e.message);
        document.getElementById('btnSalvar').disabled = false;
        document.getElementById('btnConfirm').disabled = false;
        document.getElementById('btnSalvar').textContent = '💾 Salvar';
      })
      .salvarSelecaoComp(flat);
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }
</script>
</body>
</html>
