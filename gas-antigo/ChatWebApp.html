<title>Mentor IA - Vertho</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f2b54; --teal: #34c5cc; --teal-lt: #9ae2e6;
    --purple: #9e4edd; --purple-lt: #e1aaf0; --purple-dk: #3b0a6d;
    --white: #ffffff; --ice: #f0f8f9; --line: #e2e8f0;
    --txt: #1e293b; --muted: #64748b; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height:100%; width:100%; font-family:'DM Sans','Segoe UI',sans-serif; font-size:16px; color:var(--txt); overflow:hidden; background:var(--navy); }
  .app { position:relative; display:flex; flex-direction:column; height:100%; width:100%; max-width:680px; max-height:100vh; margin:0 auto; background:var(--white); box-shadow:0 8px 60px rgba(0,0,0,.25); overflow:hidden; }
  @media(min-width:700px){ body{display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--navy) 0%,#1a1548 40%,var(--purple-dk) 100%);} .app{max-height:92vh;border-radius:20px;margin:20px;} }

  /* Header */
  .header { background:linear-gradient(135deg,var(--navy) 0%,#162045 100%); color:#fff; padding:12px 20px; display:flex; align-items:center; gap:14px; flex-shrink:0; position:relative; overflow:hidden; }
  .header::after { content:''; position:absolute; bottom:0;left:0;right:0; height:3px; background:linear-gradient(90deg,var(--teal),var(--purple-lt),var(--teal)); background-size:200% 100%; animation:shimmer 4s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .header-logo img { height:28px; display:block; }
  .header-spacer { flex:1; }
  .header-badge { display:flex; align-items:center; gap:6px; background:rgba(52,197,204,.15); border:1px solid rgba(52,197,204,.25); border-radius:20px; padding:4px 12px; font-size:11px; font-weight:500; color:var(--teal-lt); }
  .header-dot { width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Login screen */
  .id-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; position:relative; overflow:hidden; }

  .id-screen::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,.45); z-index:1; }
  .id-screen > * { position:relative; z-index:2; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .id-logo-img { height:78px; margin-bottom:20px; animation:fadeUp .6s ease .1s both; }
  .id-title { font-size:26px; font-weight:700; color:var(--navy); margin-bottom:8px; animation:fadeUp .6s ease .2s both; }
  .id-subtitle { font-size:16px; font-weight:600; color:var(--muted); margin-bottom:32px; line-height:1.6; max-width:380px; animation:fadeUp .6s ease .3s both; }
  .id-input-wrap { width:100%; max-width:360px; animation:fadeUp .6s ease .4s both; }
  .id-input { width:100%; padding:14px 16px; border:2px solid var(--line); border-radius:12px; font-size:16px; font-family:inherit; outline:none; transition:border-color .25s,box-shadow .25s; background:rgba(255,255,255,.9); backdrop-filter:blur(8px); }
  .id-input:focus { border-color:var(--teal); box-shadow:0 0 0 4px rgba(52,197,204,.12); }
  .id-input::placeholder { color:#94a3b8; }
  .id-btn { width:100%; max-width:360px; margin-top:14px; padding:14px; background:linear-gradient(135deg,var(--teal) 0%,#2ba8af 100%); color:var(--white); border:none; border-radius:12px; font-size:16px; font-weight:600; font-family:inherit; cursor:pointer; transition:transform .15s,box-shadow .15s; animation:fadeUp .6s ease .5s both; }
  .id-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(52,197,204,.3); }
  .id-btn:active { transform:translateY(0); }
  .id-btn:disabled { background:#b0bec5; cursor:not-allowed; transform:none; box-shadow:none; }
  .id-error { color:#dc2626; font-size:13px; margin-top:10px; min-height:20px; }

  /* OTP */
  .otp-wrap { width:100%; max-width:360px; text-align:center; animation:fadeUp .6s ease .4s both; }
  .otp-subtitle { color:var(--muted); font-size:13px; margin-bottom:4px; }
  .otp-email { color:var(--navy); font-weight:600; font-size:14px; margin-bottom:20px; }
  .otp-boxes { display:flex; gap:8px; justify-content:center; margin-bottom:8px; }
  .otp-box { width:46px; height:54px; border:2px solid var(--line); border-radius:12px; text-align:center; font-size:22px; font-weight:700; font-family:'Courier New',monospace; color:var(--navy); transition:border-color .25s,box-shadow .25s; background:rgba(255,255,255,.9); backdrop-filter:blur(8px); }
  .otp-box:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 4px rgba(52,197,204,.12); }
  .otp-box.filled { border-color:var(--teal); background:var(--ice); }
  .otp-timer { font-size:12px; color:var(--muted); margin-bottom:16px; }
  .otp-resend { background:none; border:none; color:var(--teal); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; padding:8px 0; }
  .otp-resend:disabled { color:var(--muted); cursor:not-allowed; }
  .otp-voltar { background:none; border:none; color:var(--muted); font-size:13px; cursor:pointer; font-family:inherit; margin-top:4px; padding:4px 0; }
  .otp-voltar:hover { color:var(--navy); }

  /* Messages */
  .messages { flex:1; overflow-y:auto; padding:16px 16px 8px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; background:var(--white); }
  .messages.hidden { display:none; }
  .msg { max-width:85%; padding:12px 16px; border-radius:var(--radius); line-height:1.6; font-size:15px; word-wrap:break-word; animation:msgIn .35s cubic-bezier(.22,.61,.36,1); }
  @keyframes msgIn { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  .msg.assistant { align-self:flex-start; background:var(--ice); color:var(--txt); border-bottom-left-radius:4px; border-left:3px solid var(--teal); }
  .msg.user { align-self:flex-end; background:linear-gradient(135deg,var(--navy) 0%,#1a2050 100%); color:#fff; border-bottom-right-radius:4px; }
  .typing { align-self:flex-start; display:none; padding:14px 18px; background:var(--ice); border-radius:var(--radius); border-bottom-left-radius:4px; border-left:3px solid var(--teal); }
  .typing.show { display:flex; gap:5px; align-items:center; }
  .typing-dot { width:8px;height:8px;background:var(--teal);border-radius:50%;animation:bounce .6s infinite alternate; }
  .typing-dot:nth-child(2){animation-delay:.15s} .typing-dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce { from{transform:translateY(0);opacity:.4} to{transform:translateY(-6px);opacity:1} }

  /* Input */
  .input-area { padding:12px 16px 20px; background:var(--white); border-top:1px solid var(--line); flex-shrink:0; }
  .input-area.hidden { display:none; }
  .input-wrap { display:flex; gap:8px; align-items:flex-end; }
  .input-wrap textarea { flex:1; resize:none; border:2px solid var(--line); border-radius:12px; padding:12px 14px; font-size:16px; font-family:inherit; outline:none; min-height:44px; max-height:120px; transition:border-color .25s,box-shadow .25s; line-height:1.4; color:var(--txt); }
  .input-wrap textarea:focus { border-color:var(--teal); box-shadow:0 0 0 4px rgba(52,197,204,.1); }
  .input-wrap textarea::placeholder { color:#94a3b8; }
  .send-btn { width:44px;height:44px;background:linear-gradient(135deg,var(--teal) 0%,#2ba8af 100%);color:#fff;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,box-shadow .15s; }
  .send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(52,197,204,.3)} .send-btn:active{transform:translateY(0)} .send-btn:disabled{background:var(--line);cursor:not-allowed;transform:none;box-shadow:none} .send-btn svg{width:20px;height:20px}
  .status-bar { text-align:center; font-size:11px; color:var(--muted); padding:6px 4px 0; display:flex; align-items:center; justify-content:center; gap:4px; }
  .status-bar::before { content:'\1f512'; font-size:10px; }

    <div class="id-title">Verificação</div>
    <div class="otp-wrap">
      <div class="otp-subtitle">Código enviado para</div>
      <div class="otp-email" id="otpEmailLabel"></div>
      <div class="otp-boxes" id="otpBoxes">
        <input class="otp-box" type="tel" maxlength="1" inputmode="numeric"><input class="otp-box" type="tel" maxlength="1" inputmode="numeric"><input class="otp-box" type="tel" maxlength="1" inputmode="numeric"><input class="otp-box" type="tel" maxlength="1" inputmode="numeric"><input class="otp-box" type="tel" maxlength="1" inputmode="numeric"><input class="otp-box" type="tel" maxlength="1" inputmode="numeric">
      </div>
      <div class="otp-timer" id="otpTimer">Válido por 15:00</div>
      <button class="id-btn" id="btnValidar" onclick="validarCodigo()">Verificar código</button>
      <div class="id-error" id="otpError"></div>
      <button class="otp-resend" id="btnReenviar" onclick="reenviarOTP()" disabled>Reenviar código</button>
      <button class="otp-voltar" onclick="voltarLogin()">&#8592; Usar outro e-mail</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages hidden" id="messages">
    <div class="typing" id="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
  </div>

  <!-- Input -->
  <div class="input-area hidden" id="inputArea">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="Digite sua resposta..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="enviar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
    </div>
    <div class="status-bar">Suas respostas são confidenciais</div>
  </div>
</div>

<script>
  var userId = '', userName = '', sending = false, _otpInterval = null;
  var preEmail = '<?= userEmail ?>';
  if (preEmail) document.getElementById('emailInput').value = preEmail;

  // ── OTP PASSO 1: ENVIAR CÓDIGO ──
  function identificar() {
    var email = document.getElementById('emailInput').value.trim();
    if (!email) { document.getElementById('idError').textContent = 'Informe seu e-mail corporativo.'; return; }
    document.getElementById('idBtn').disabled = true;
    document.getElementById('idBtn').textContent = 'Enviando...';
    document.getElementById('idError').textContent = '';
    google.script.run
      .withSuccessHandler(function(r) {
        document.getElementById('idBtn').disabled = false;
        document.getElementById('idBtn').textContent = 'Enviar código de acesso';
        if (!r.success) { document.getElementById('idError').textContent = r.message; return; }
        document.getElementById('otpEmailLabel').textContent = email;
        document.getElementById('idScreen').classList.add('hidden');
        document.getElementById('otpScreen').classList.remove('hidden');
        iniciarTimerOTP(); focarOTP(0);
      })
      .withFailureHandler(function() {
        document.getElementById('idError').textContent = 'Erro de conexão.';
        document.getElementById('idBtn').disabled = false;
        document.getElementById('idBtn').textContent = 'Enviar código de acesso';
      })
      .enviarOTP(email, 'chat');
  }

  // ── OTP PASSO 2: VALIDAR ──
  function validarCodigo() {
    var codigo = lerCodigoOTP();
    if (codigo.length < 6) { document.getElementById('otpError').textContent = 'Digite os 6 dígitos.'; return; }
    document.getElementById('otpError').textContent = '';
    document.getElementById('btnValidar').disabled = true;
    document.getElementById('btnValidar').textContent = 'Verificando...';
    var email = document.getElementById('emailInput').value.trim();
    google.script.run
      .withSuccessHandler(function(r) {
        document.getElementById('btnValidar').disabled = false;
        document.getElementById('btnValidar').textContent = 'Verificar código';
        if (!r.success) { document.getElementById('otpError').textContent = r.message; limparOTP(); focarOTP(0); return; }
        document.getElementById('otpScreen').classList.add('hidden');
        _completarLogin(email);
      })
      .withFailureHandler(function(e) {
        document.getElementById('btnValidar').disabled = false;
        document.getElementById('btnValidar').textContent = 'Verificar código';
        document.getElementById('otpError').textContent = 'Erro: ' + e.message;
      })
      .validarOTP(email, codigo);
  }

  // ── COMPLETAR LOGIN ──
  function _completarLogin(email) {
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.success) {
          userId = email.toLowerCase();
          userName = result.userName || 'Colaborador';
          document.getElementById('messages').classList.remove('hidden');
          document.getElementById('inputArea').classList.remove('hidden');
          if (result.hasSession) {
            google.script.run
              .withSuccessHandler(function(history) {
                if (history && history.length > 0) {
                  for (var i = 0; i < history.length; i++) addMessage(history[i].role, history[i].content);
                  var sep = document.createElement('div');
                  sep.style.cssText = 'text-align:center;font-size:11px;color:#94a3b8;padding:8px 0;';
                  sep.textContent = '\u2014 conversa retomada \u2014';
                  document.getElementById('messages').insertBefore(sep, document.getElementById('typing'));
                }
                enviarMensagem('oi');
              })
              .withFailureHandler(function() { enviarMensagem('oi'); })
              .getRecentHistory(email.toLowerCase());
          } else addMessage('assistant', result.message);
        } else {
          document.getElementById('idScreen').classList.remove('hidden');
          document.getElementById('idError').textContent = result.message;
        }
      })
      .withFailureHandler(function() {
        document.getElementById('idScreen').classList.remove('hidden');
        document.getElementById('idError').textContent = 'Erro de conexão.';
      })
      .identificarColaborador(email);
  }

  // ── OTP HELPERS ──
  function reenviarOTP() {
    document.getElementById('btnReenviar').disabled = true;
    document.getElementById('otpError').textContent = '';
    google.script.run
      .withSuccessHandler(function(r) {
        if (!r.success) { document.getElementById('otpError').textContent = r.message; return; }
        iniciarTimerOTP(); limparOTP(); focarOTP(0);
        document.getElementById('otpTimer').textContent = 'Novo código enviado! Válido por 15:00';
      })
      .withFailureHandler(function() { document.getElementById('otpError').textContent = 'Erro ao reenviar.'; })
      .enviarOTP(document.getElementById('emailInput').value.trim(), 'chat');
  }
  function voltarLogin() {
    if (_otpInterval) clearInterval(_otpInterval);
    document.getElementById('otpScreen').classList.add('hidden');
    document.getElementById('idScreen').classList.remove('hidden');
  }
  function focarOTP(idx) {
    var boxes = document.querySelectorAll('#otpBoxes .otp-box');
    if (idx >= 0 && idx < boxes.length) setTimeout(function(){boxes[idx].focus();},50);
  }
  function lerCodigoOTP() {
    var c=''; document.querySelectorAll('#otpBoxes .otp-box').forEach(function(b){c+=b.value;}); return c;
  }
  function limparOTP() {
    document.querySelectorAll('#otpBoxes .otp-box').forEach(function(b){b.value='';b.classList.remove('filled');});
  }
  function iniciarTimerOTP() {
    if (_otpInterval) clearInterval(_otpInterval);
    var secs=900; document.getElementById('btnReenviar').disabled=true;
    _otpInterval=setInterval(function(){
      secs--;
      if(secs<=0){clearInterval(_otpInterval);document.getElementById('otpTimer').textContent='Código expirado';document.getElementById('btnReenviar').disabled=false;return;}
      var m=Math.floor(secs/60),s=secs%60;
      document.getElementById('otpTimer').textContent='Válido por '+m+':'+(s<10?'0':'')+s;
      if(secs<=870) document.getElementById('btnReenviar').disabled=false;
    },1000);
  }
  (function(){
    var boxes=document.querySelectorAll('#otpBoxes .otp-box');
    boxes.forEach(function(box,i){
      box.addEventListener('input',function(){
        var v=box.value.replace(/[^0-9]/g,'');box.value=v.slice(0,1);
        box.classList.toggle('filled',box.value!=='');
        if(v&&i<5)focarOTP(i+1);
        if(lerCodigoOTP().length===6)validarCodigo();
      });
      box.addEventListener('keydown',function(e){
        if(e.key==='Backspace'&&!box.value&&i>0)focarOTP(i-1);
        if(e.key==='Enter')validarCodigo();
      });
      box.addEventListener('paste',function(e){
        e.preventDefault();
        var paste=(e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'').slice(0,6);
        for(var p=0;p<paste.length&&(i+p)<6;p++){boxes[i+p].value=paste[p];boxes[i+p].classList.add('filled');}
        if(paste.length>0)focarOTP(Math.min(i+paste.length,5));
        if(lerCodigoOTP().length===6)setTimeout(validarCodigo,100);
      });
    });
  })();

  // ── CHAT ──
  function enviar() {
    var input=document.getElementById('msgInput'); var text=input.value.trim();
    if(!text||sending) return; input.value=''; input.style.height='auto'; enviarMensagem(text);
  }
  function enviarMensagem(text) {
    if(text!=='oi') addMessage('user',text);
    sending=true; document.getElementById('sendBtn').disabled=true; showTyping(true);
    google.script.run
      .withSuccessHandler(function(result){
        showTyping(false);sending=false;document.getElementById('sendBtn').disabled=false;
        if(result&&result.reply) addMessage('assistant',result.reply);
        document.getElementById('msgInput').focus();
      })
      .withFailureHandler(function(){
        showTyping(false);sending=false;document.getElementById('sendBtn').disabled=false;
        addMessage('assistant','Desculpe, houve um erro. Tente enviar novamente.');
      })
      .processarMensagemChat(userId,userName,text);
  }
  function addMessage(role,text) {
    var container=document.getElementById('messages');var typing=document.getElementById('typing');
    var div=document.createElement('div');div.className='msg '+role;
    div.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
    container.insertBefore(div,typing);scrollToBottom();
  }
  function showTyping(show){var el=document.getElementById('typing');if(show)el.classList.add('show');else el.classList.remove('show');scrollToBottom();}
  function scrollToBottom(){var c=document.getElementById('messages');setTimeout(function(){c.scrollTop=c.scrollHeight;},50);}
  function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}}
  function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
  document.getElementById('emailInput').addEventListener('keydown',function(e){if(e.key==='Enter')identificar();});
