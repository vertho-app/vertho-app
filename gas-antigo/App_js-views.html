<script>
/**
 * ============================================================
 * VERTHO APP — Views
 * ============================================================
 * Cada função retorna HTML string para uma tela.
 * Dados vêm do State (pré-carregados) ou são buscados on-demand.
 * ============================================================
 */

var Views = {
  
  // ─── INÍCIO (HOME) ────────────────────────────────────
  
  renderInicio: function() {
    var user = State.get('user') || {};
    var dashboard = State.get('dashboard');

    // Se não tem dados ainda, busca e re-renderiza
    if (!dashboard) {
      State.fetch('dashboard', 'home.getDashboard').then(function() {
        if (Router.current() === 'inicio') Router.go('inicio');
      }).catch(function(err) {
        // Fallback: mostrar home sem dados do server
        State.set('dashboard', {
          jornada: { percentual: 0, etapaAtual: 'Iniciar jornada', totalEtapas: 10, concluidas: 0 },
          pdi: {}, focoDaSemana: {}, evolucao: {}
        });
        if (Router.current() === 'inicio') Router.go('inicio');
      });

      return '<div class="view-enter">' +
        Views._skeleton(3) +
      '</div>';
    }

    var jornada = dashboard.jornada || {};
    var pdi = dashboard.pdi || {};
    var foco = dashboard.focoDaSemana || {};
    var evolucao = dashboard.evolucao || {};

    // URLs externas
    var gasUrl = State.get('gasUrl') || '';
    var cisUrl = 'https://perfil.vertho.com.br';
    var assessUrl = gasUrl ? gasUrl + '?view=assessment&email=' + encodeURIComponent(user.email || '') : '#assessment';

    return '<div class="view-enter">' +

      // Hero (compacto para mobile)
      '<div class="card card-hero" style="padding:16px">' +
        '<div class="card-subtitle" style="font-size:15px">Olá, ' + _esc((user.nome || 'Educador').split(' ')[0]) + '</div>' +
        '<div class="card-title" style="font-size:17px;margin-top:2px;">Vamos continuar sua evolução</div>' +
        '<div class="progress-bar" style="margin-top:10px;">' +
          '<div class="progress-bar-fill" style="width:' + (jornada.percentual || 0) + '%;background:var(--v-cyan-light)"></div>' +
        '</div>' +
        '<div class="text-xs" style="color:rgba(255,255,255,0.7);margin-top:4px">' + (jornada.percentual || 0) + '% da jornada concluída</div>' +
      '</div>' +

      // Próximo passo (compacto)
      '<div class="card" style="margin-top:8px;border-left:4px solid var(--v-cyan);cursor:pointer;padding:12px 16px" ' +
        'onclick="Router.go(\'jornada\')">' +
        '<div class="text-xs text-muted fw-600" style="text-transform:uppercase;letter-spacing:0.05em">Próximo passo</div>' +
        '<div class="fw-600" style="margin-top:4px">' + _esc(jornada.etapaAtual || 'Iniciar jornada') + '</div>' +
      '</div>' +

      // Foco da semana
      (foco.competencia ? (
        '<div class="section-header">' +
          '<span class="section-title">Foco da semana</span>' +
        '</div>' +
        '<div class="card">' +
          '<div class="fw-600">' + _esc(foco.competencia) + '</div>' +
          (foco.exercicio ? (
            '<div class="text-sm text-muted mt-sm">' + _esc(foco.exercicio) + '</div>' +
            (foco.tempoEstimado ? '<div class="text-xs text-muted mt-sm">' + _esc(foco.tempoEstimado) + '</div>' : '') +
            '<button class="btn btn-primary btn-sm mt-md" onclick="Router.go(\'praticar\')">Fazer agora</button>'
          ) : '')  +
        '</div>'
      ) : '') +

      // Acesso rápido — 4 boxes com altura fixa + links externos para CIS e Assessment
      '<div class="section-header">' +
        '<span class="section-title">Acesso rápido</span>' +
      '</div>' +
      '<div class="quick-grid">' +
        Views._quickAccessCard('Perfil Comportamental', '🧠', 'perfil-cis') +
        Views._quickAccessCard('Competências', '🎯', 'assessment') +
        Views._quickAccessCard('Mentor IA', '🤖', 'beto') +
        Views._quickAccessCard('Meu PDI', '📋', 'pdi') +
      '</div>' +

    '</div>';
  },

  _abrirEvidencia: function() {
    var gasUrl = State.get('gasUrl') || '';
    var user = State.get('user') || {};
    var dash = State.get('dashboard') || {};
    var foco = dash.focoDaSemana || {};
    var semana = foco.semana || 4;
    if (gasUrl) {
      App.openExternal(gasUrl + '?view=evidencia&email=' + encodeURIComponent(user.email || '') + '&semana=' + semana);
    } else {
      Toast.show('URL não disponível. Tente novamente.', 'error');
    }
  },

  _quickAccessCard: function(label, icon, action) {
    return '<div class="quick-card" onclick="Views._quickAction(\'' + action + '\')">' +
      '<div style="font-size:28px;margin-bottom:6px">' + icon + '</div>' +
      '<div class="text-sm fw-600" style="line-height:1.3">' + _esc(label) + '</div>' +
    '</div>';
  },

  _quickAction: function(action) {
    switch(action) {
      case 'perfil-cis': Views._abrirPerfilCIS(); break;
      case 'assessment': App.openDiagnostico(); break;
      case 'beto':       BETO.toggle(); break;
      case 'pdi':        Router.go('pdi'); break;
      default:           Router.go(action); break;
    }
  },

  /**
   * Perfil Comportamental: consulta se já fez → mostra resultado inline ou abre webapp
   */
  _abrirPerfilCIS: function() {
    var user = State.get('user') || {};
    var email = user.email || App._email || '';
    if (!email) { Toast.show('E-mail não identificado', 'error'); return; }

    // Verifica se já tem resultado no cache do State
    var cisCache = State.get('cis_resultado');
    if (cisCache && cisCache.exists) {
      Router.go('perfil-cis-resultado');
      return;
    }

    Toast.show('Verificando perfil...', 'info');
    API.call('cis.check', { email: email })
      .then(function(data) {
        if (data && data.exists && data.profileLabel) {
          State.set('cis_resultado', data);
          Router.go('perfil-cis-resultado');
        } else {
          // Não fez — abrir webapp CIS com email pré-preenchido
          window.location.href = 'https://perfil.vertho.com.br?email=' + encodeURIComponent(email);
        }
      })
      .catch(function() {
        // Fallback: abrir webapp
        window.location.href = 'https://perfil.vertho.com.br?email=' + encodeURIComponent(email);
      });
  },

  /**
   * View de resultado CIS inline (dentro do app)
   */
  renderPerfilCISResultado: function() {
    var cis = State.get('cis_resultado') || {};
    if (!cis.exists) return '<div class="view-enter"><p class="text-muted">Perfil não encontrado.</p></div>';

    var disc = cis.disc || {};
    var discA = cis.discAdapted || cis.discA || {};
    var lead = cis.leadership || {};
    var comp = cis.competencies || {};

    var discNames = {D:'Dominância', I:'Influência', S:'Estabilidade', C:'Conformidade'};
    var discColors = {D:'#EF4444', I:'#FBBF24', S:'#22C55E', C:'#3B82F6'};

    var _bar = function(label, val, color, max) {
      var pct = Math.min(Math.round((val / (max || 100)) * 100), 100);
      return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
        '<span class="text-sm fw-600" style="width:110px;flex-shrink:0">' + _esc(label) + '</span>' +
        '<div style="flex:1;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden">' +
          '<div style="width:' + pct + '%;height:100%;background:' + color + ';border-radius:4px"></div>' +
        '</div>' +
        '<span class="text-sm fw-700" style="width:32px;text-align:right">' + Math.round(val) + '</span>' +
      '</div>';
    };

    // Competências agrupadas por perfil DISC
    var compGroups = [
      { title: 'Dominância', color: '#EF4444', keys: ['Ousadia','Comando','Objetividade','Assertividade'] },
      { title: 'Influência', color: '#FBBF24', keys: ['Persuasão','Extroversão','Entusiasmo','Sociabilidade'] },
      { title: 'Estabilidade', color: '#22C55E', keys: ['Empatia','Paciência','Persistência','Planejamento'] },
      { title: 'Conformidade', color: '#3B82F6', keys: ['Organização','Detalhismo','Prudência','Concentração'] }
    ];

    // Forças e desenvolvimento (top 3 e bottom 3)
    var compArr = Object.keys(comp).map(function(k) { return [k, comp[k]]; }).sort(function(a,b) { return b[1] - a[1]; });
    var top3 = compArr.slice(0, 3);
    var bot3 = compArr.slice(-3).reverse();

    var html = '<div class="view-enter">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +
        '<button onclick="Router.go(\'inicio\')" style="background:none;border:none;color:var(--v-cyan);font-size:20px;cursor:pointer">←</button>' +
        '<span class="card-title" style="font-size:var(--font-lg)">Perfil Comportamental</span>' +
      '</div>' +

      // Perfil label grande
      '<div class="card" style="text-align:center;padding:24px">' +
        '<div style="font-size:56px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,#2DD4BF,#FCD34D);-webkit-background-clip:text;-webkit-text-fill-color:transparent">' + _esc(cis.profileLabel || '?') + '</div>' +
        '<div class="text-sm text-muted" style="margin-top:4px">Perfil Natural DISC</div>' +
      '</div>' +

      // Radar Chart SVG (DISC Natural vs Adaptado)
      (function() {
        var cx = 120, cy = 120, r = 90;
        var labels = ['D','I','S','C'];
        var angles = [270, 0, 90, 180]; // top, right, bottom, left
        var colors = {nat: '#2DD4BF', adapt: '#FB7185'};

        // Helper: polar to cartesian
        var _p = function(angle, radius) {
          var rad = angle * Math.PI / 180;
          return [cx + radius * Math.cos(rad), cy + radius * Math.sin(rad)];
        };

        // Grid circles
        var grid = '';
        [0.25, 0.5, 0.75, 1].forEach(function(s) {
          var pts = angles.map(function(a) { return _p(a, r * s); });
          grid += '<polygon points="' + pts.map(function(p) { return p[0]+','+p[1]; }).join(' ') + '" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
        });

        // Axes
        var axes = '';
        angles.forEach(function(a, i) {
          var ep = _p(a, r + 5);
          axes += '<line x1="' + cx + '" y1="' + cy + '" x2="' + ep[0] + '" y2="' + ep[1] + '" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>';
          var lp = _p(a, r + 18);
          var col = discColors[labels[i]];
          axes += '<text x="' + lp[0] + '" y="' + (lp[1]+4) + '" text-anchor="middle" fill="' + col + '" font-size="13" font-weight="700" font-family="inherit">' + labels[i] + '</text>';
        });

        // Data polygon - Natural
        var natPts = labels.map(function(k, i) {
          var val = Math.min((disc[k] || 0) / 100, 1);
          return _p(angles[i], r * val);
        });
        var natPoly = '<polygon points="' + natPts.map(function(p) { return p[0]+','+p[1]; }).join(' ') + '" fill="rgba(45,212,191,0.2)" stroke="' + colors.nat + '" stroke-width="2"/>';

        // Data polygon - Adapted
        var adaptPoly = '';
        if (discA && (discA.D || discA.I || discA.S || discA.C)) {
          var adPts = labels.map(function(k, i) {
            var val = Math.min((discA[k] || 0) / 100, 1);
            return _p(angles[i], r * val);
          });
          adaptPoly = '<polygon points="' + adPts.map(function(p) { return p[0]+','+p[1]; }).join(' ') + '" fill="rgba(251,113,133,0.15)" stroke="' + colors.adapt + '" stroke-width="2" stroke-dasharray="4,3"/>';
        }

        // Dots
        var dots = natPts.map(function(p) {
          return '<circle cx="' + p[0] + '" cy="' + p[1] + '" r="4" fill="' + colors.nat + '"/>';
        }).join('');

        return '<div class="card mt-sm" style="text-align:center;padding:16px">' +
          '<svg width="240" height="240" viewBox="0 0 240 240" style="display:block;margin:0 auto">' +
            grid + axes + adaptPoly + natPoly + dots +
          '</svg>' +
          '<div style="display:flex;justify-content:center;gap:16px;margin-top:8px">' +
            '<span style="font-size:12px;font-weight:700;color:#2DD4BF">● Natural</span>' +
            (adaptPoly ? '<span style="font-size:12px;font-weight:700;color:#FB7185">● Adaptado</span>' : '') +
          '</div>' +
        '</div>';
      })() +

      // Forças e Desenvolvimento lado a lado
      '<div style="display:flex;gap:6px;margin-top:8px">' +
        '<div class="card" style="flex:1;text-align:center;margin:0">' +
          '<div class="text-xs fw-700" style="color:#22C55E;letter-spacing:1px;margin-bottom:8px">FORÇAS</div>';
    top3.forEach(function(c) {
      html += '<div style="font-size:14px;font-weight:600;margin-bottom:4px">' + _esc(c[0]) + ' <span style="color:#22C55E">' + Math.round(c[1]) + '</span></div>';
    });
    html += '</div>' +
        '<div class="card" style="flex:1;text-align:center;margin:0">' +
          '<div class="text-xs fw-700" style="color:#FB7185;letter-spacing:1px;margin-bottom:8px">DESENVOLVIMENTO</div>';
    bot3.forEach(function(c) {
      html += '<div style="font-size:14px;font-weight:600;margin-bottom:4px">' + _esc(c[0]) + ' <span style="color:#FB7185">' + Math.round(c[1]) + '</span></div>';
    });
    html += '</div></div>';

    // DISC Natural
    html += '<div class="card mt-sm">' +
      '<div class="text-xs fw-700 text-muted" style="text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">DISC Natural</div>';
    ['D','I','S','C'].forEach(function(k) {
      html += _bar(discNames[k], disc[k] || 0, discColors[k], 100);
    });
    html += '</div>';

    // DISC Adaptado
    if (discA && (discA.D || discA.I || discA.S || discA.C)) {
      html += '<div class="card mt-sm">' +
        '<div class="text-xs fw-700" style="color:#FB7185;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">DISC Adaptado</div>';
      ['D','I','S','C'].forEach(function(k) {
        html += _bar(discNames[k], discA[k] || 0, discColors[k], 100);
      });
      html += '</div>';
    }

    // Estilo de Liderança
    html += '<div class="card mt-sm">' +
      '<div class="text-xs fw-700 text-muted" style="text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Estilo de Liderança</div>';
    ['Executivo','Motivador','Metodico','Sistematico'].forEach(function(k) {
      html += _bar(k.replace('Metodico','Metódico').replace('Sistematico','Sistemático'), lead[k] || 0, 'var(--v-cyan, #0D9488)', 50);
    });
    html += '</div>';

    // Todas as 16 competências agrupadas por perfil DISC
    compGroups.forEach(function(g) {
      html += '<div class="card mt-sm">' +
        '<div class="text-xs fw-700" style="color:' + g.color + ';text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Competências — ' + g.title + '</div>';
      g.keys.forEach(function(k) {
        html += _bar(k, comp[k] || 0, g.color, 100);
      });
      html += '</div>';
    });

    html += '</div>';
    return html;
  },
  
  // ─── JORNADA ──────────────────────────────────────────
  
  renderJornada: function() {
    var etapas = State.get('etapas');
    
    if (!etapas) {
      State.fetch('etapas', 'jornada.getEtapas').then(function() {
        if (Router.current() === 'jornada') Router.go('jornada');
      });
      return '<div class="view-enter">' + Views._skeleton(5) + '</div>';
    }
    
    var dash = State.get('dashboard') || {};
    var jornada = dash.jornada || {};
    
    var html = '<div class="view-enter">' +
      '<div class="card-title" style="font-size:var(--font-lg)">Sua jornada de desenvolvimento</div>' +
      '<div class="progress-bar" style="margin:12px 0 4px">' +
        '<div class="progress-bar-fill" style="width:' + (jornada.percentual || 0) + '%"></div>' +
      '</div>' +
      '<div class="text-sm text-muted mb-md">' + (jornada.percentual || 0) + '% concluída</div>' +
      
      '<div class="timeline">';
    
    etapas.forEach(function(etapa, i) {
      var status = etapa.status || 'futuro';
      var dotClass = status === 'concluido' ? 'done' : 
                     status === 'em_andamento' ? 'active' : '';
      var dotContent = status === 'concluido' ? '✓' : (i + 1);
      
      var chipClass = 'chip-' + (
        status === 'concluido' ? 'concluido' :
        status === 'em_andamento' ? 'andamento' :
        status === 'disponivel' ? 'disponivel' :
        status === 'aguardando' ? 'aguardando' : 'futuro'
      );
      
      var chipLabel = status === 'concluido' ? 'Concluído' :
                      status === 'em_andamento' ? 'Em andamento' :
                      status === 'disponivel' ? 'Disponível' :
                      status === 'aguardando' ? 'Aguardando' : 'Futuro';
      
      var isClickable = ['concluido', 'em_andamento', 'disponivel'].indexOf(status) > -1;
      var onclick = isClickable ? Views._getEtapaRoute(etapa.id) : '';
      
      html += '<div class="timeline-item" ' + (isClickable ? 'style="cursor:pointer" onclick="' + onclick + '"' : '') + '>' +
        '<div class="timeline-dot ' + dotClass + '">' + dotContent + '</div>' +
        '<div class="card" style="padding:12px 16px">' +
          '<div class="flex justify-between items-center">' +
            '<div class="fw-600">' + _esc(etapa.nome) + '</div>' +
            '<span class="chip ' + chipClass + '">' + chipLabel + '</span>' +
          '</div>' +
          '<div class="text-sm text-muted mt-sm">' + _esc(etapa.descricao || '') + '</div>' +
          (etapa.progresso ? '<div class="text-xs text-cyan mt-sm">' + _esc(etapa.progresso) + '</div>' : '') +
        '</div>' +
      '</div>';
    });
    
    html += '</div></div>';
    return html;
  },
  
  _getEtapaRoute: function(etapaId) {
    var routes = {
      1: "Views._abrirPerfilCIS()",
      2: "App.openDiagnostico()",
      3: "Router.go('pdi')",
      4: "Router.go('academia')",
      5: "BETO.toggle('tiraDuvida')",
      6: "Router.go('praticar')",
      7: "BETO.toggle()",
      8: "Router.go('resultado')",
      9: "Router.go('resultado')",
      10: "Router.go('evolucao')"
    };
    return routes[etapaId] || '';
  },
  
  // ─── PRATICAR ─────────────────────────────────────────
  
  renderPraticar: function() {
    return '<div class="view-enter">' +
      '<div class="card-title" style="font-size:var(--font-lg);margin-bottom:16px">Praticar</div>' +
      
      
      // Trilha de conteúdo
      '<div class="card mt-md" style="cursor:pointer" onclick="Router.go(\'academia\')">' +
        '<div class="flex items-center gap-sm">' +
          '<span style="font-size:24px">📚</span>' +
          '<div>' +
            '<div class="fw-600">Trilha de conteúdo</div>' +
            '<div class="text-sm text-muted">Conteúdos recomendados para seu PDI</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      
      // Tira-dúvida
      '<div class="card mt-md" style="cursor:pointer" onclick="BETO.toggle(\'tiraDuvida\')">' +
        '<div class="flex items-center gap-sm">' +
          '<span style="font-size:24px">💬</span>' +
          '<div>' +
            '<div class="fw-600">Tira-dúvida</div>' +
            '<div class="text-sm text-muted">Respostas rápidas com base na sua jornada</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      
      // Registro de evidência
      '<div class="card mt-md" style="cursor:pointer" onclick="Views._abrirEvidencia()">' +
        '<div class="flex items-center gap-sm">' +
          '<span style="font-size:24px">🎯</span>' +
          '<div>' +
            '<div class="fw-600">Registrar evidência</div>' +
            '<div class="text-sm text-muted">Registre o que praticou esta semana</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      
    '</div>';
  },
  
  // ─── EVOLUÇÃO ─────────────────────────────────────────
  
  renderEvolucao: function() {
    var progresso = State.get('progresso');
    
    if (!progresso) {
      State.fetch('progresso', 'evolucao.getProgresso').then(function() {
        if (Router.current() === 'evolucao') Router.go('evolucao');
      });
      return '<div class="view-enter">' + Views._skeleton(3) + '</div>';
    }
    
    return '<div class="view-enter">' +
      '<div class="card-title" style="font-size:var(--font-lg)">Sua evolução até aqui</div>' +
      
      // Progresso geral
      '<div class="card mt-md">' +
        '<div class="flex justify-between items-center">' +
          '<span class="text-sm text-muted">Progresso geral do ciclo</span>' +
          '<span class="fw-600 text-cyan">' + (progresso.percentualCiclo || 0) + '%</span>' +
        '</div>' +
        '<div class="progress-bar">' +
          '<div class="progress-bar-fill" style="width:' + (progresso.percentualCiclo || 0) + '%"></div>' +
        '</div>' +
        (progresso.pontosEvolucao ? 
          '<div class="text-sm text-muted">+' + progresso.pontosEvolucao + ' pontos de evolução desde o início</div>' 
          : '') +
      '</div>' +
      
      // Links
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px">' +
        '<div class="card" style="text-align:center;cursor:pointer" onclick="Router.go(\'resultado\')">' +
          '<div style="font-size:24px;margin-bottom:6px">📊</div>' +
          '<div class="text-sm fw-600">Resultado do ciclo</div>' +
        '</div>' +
        '<div class="card" style="text-align:center;cursor:pointer" onclick="Router.go(\'comparacao\')">' +
          '<div style="font-size:24px;margin-bottom:6px">🔄</div>' +
          '<div class="text-sm fw-600">Antes × Agora</div>' +
        '</div>' +
      '</div>' +
      
      // Insight
      (progresso.insightDaSemana ? (
        '<div class="section-header"><span class="section-title">Insight da semana</span></div>' +
        '<div class="card" style="border-left:4px solid var(--v-lilac)">' +
          '<div class="text-sm">' + _esc(progresso.insightDaSemana) + '</div>' +
        '</div>'
      ) : '') +
      
    '</div>';
  },
  
  // ─── PDI ──────────────────────────────────────────────
  
  renderPDI: function() {
    var pdi = State.get('pdi');
    
    if (!pdi) {
      State.fetch('pdi', 'pdi.get').then(function() {
        if (Router.current() === 'pdi') Router.go('pdi');
      });
      return '<div class="view-enter">' + Views._skeleton(4) + '</div>';
    }
    
    var ciclo = pdi.ciclo || {};
    var comps = pdi.competencias || [];
    
    var html = '<div class="view-enter">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +
        '<button class="btn btn-sm btn-secondary" onclick="Router.back()">← Voltar</button>' +
        '<div class="card-title" style="font-size:var(--font-lg);margin:0">Meu PDI</div>' +
      '</div>' +
      
      // Cabeçalho do ciclo
      '<div class="card">' +
        '<div class="text-sm text-muted">Ciclo atual: ' + (ciclo.duracao || 30) + ' dias</div>' +
        '<div class="progress-bar">' +
          '<div class="progress-bar-fill lilac" style="width:' + (ciclo.progresso || 0) + '%"></div>' +
        '</div>' +
        '<div class="text-sm text-muted">' + (ciclo.progresso || 0) + '% do plano executado</div>' +
        (ciclo.objetivo ? '<div class="text-sm mt-md">' + _esc(ciclo.objetivo) + '</div>' : '') +
      '</div>';
    
    // Competências prioritárias
    if (comps.length) {
      html += '<div class="section-header"><span class="section-title">Competências prioritárias</span></div>';
      
      comps.forEach(function(comp, i) {
        var stars = '';
        for (var s = 1; s <= 4; s++) { stars += s <= comp.nivelAtual ? '★' : '☆'; }

        html += '<div class="card" style="margin-bottom:12px;border-left:4px solid ' + (comp.prioridade === 'alta' ? 'var(--v-red)' : comp.prioridade === 'média' ? 'var(--v-gold)' : 'var(--v-cyan)') + '">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<div class="fw-600">' + _esc(comp.nome) + '</div>' +
            '<span style="color:var(--v-gold);font-size:14px;letter-spacing:1px">' + stars + '</span>' +
          '</div>' +
          '<div class="text-sm text-muted" style="margin-top:4px">Meta: nível ' + (comp.meta || '—') + '</div>' +
          (comp.pontosFortes ? '<div style="margin-top:8px;padding:8px 10px;background:rgba(13,148,136,0.1);border-radius:8px"><div class="text-xs fw-600" style="color:var(--v-cyan)">Pontos fortes</div><div class="text-sm" style="margin-top:2px">' + _esc(comp.pontosFortes).substring(0, 200) + '</div></div>' : '') +
          (comp.pontosAtencao ? '<div style="margin-top:6px;padding:8px 10px;background:rgba(245,158,11,0.1);border-radius:8px"><div class="text-xs fw-600" style="color:var(--v-gold)">Pontos de atenção</div><div class="text-sm" style="margin-top:2px">' + _esc(comp.pontosAtencao).substring(0, 200) + '</div></div>' : '') +
          (comp.feedback ? '<div style="margin-top:6px"><div class="text-xs fw-600 text-muted">Feedback</div><div class="text-sm" style="margin-top:2px">' + _esc(comp.feedback).substring(0, 300) + '</div></div>' : '') +
        '</div>';
      });
    }
    
    // Recomendação da IA
    if (pdi.recomendacaoIA) {
      html += '<div class="card mt-md" style="border-left:4px solid var(--v-navy)">' +
        '<div class="text-xs text-muted fw-600" style="text-transform:uppercase;letter-spacing:0.05em">Recomendação da IA</div>' +
        '<div class="text-sm mt-sm">' + _esc(pdi.recomendacaoIA) + '</div>' +
        '<button class="btn btn-sm btn-secondary mt-md" onclick="BETO.toggle(\'pdi\')">Falar com Mentor IA</button>' +
      '</div>';
    }
    
    html += '</div>';
    return html;
  },
  
  // ─── PERFIL ───────────────────────────────────────────
  
  renderPerfil: function() {
    var user = State.get('user') || {};

    var _row = function(label, value) {
      if (!value) return '';
      return '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.08)">' +
        '<span class="text-sm text-muted">' + label + '</span>' +
        '<span class="text-sm fw-600">' + _esc(value) + '</span>' +
      '</div>';
    };

    return '<div class="view-enter">' +
      '<div class="card-title" style="font-size:var(--font-lg);margin-bottom:16px">Perfil</div>' +

      '<div class="card">' +
        '<div style="text-align:center;margin-bottom:12px">' +
          '<div style="width:56px;height:56px;border-radius:50%;background:var(--v-cyan);color:var(--v-navy);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto">' +
            _esc((user.nome || '?')[0].toUpperCase()) +
          '</div>' +
          '<div class="fw-600" style="font-size:var(--font-md);margin-top:8px">' + _esc(user.nome || '—') + '</div>' +
        '</div>' +
        _row('E-mail', user.email) +
        _row('Cargo', user.cargo) +
        _row('Escola', user.escola) +
        _row('WhatsApp', user.whatsapp) +
      '</div>' +

      '<div class="card mt-md" style="cursor:pointer" onclick="BETO.toggle()">' +
        '<div class="flex items-center gap-sm">' +
          '<span style="font-size:20px">💬</span>' +
          '<div>' +
            '<div class="fw-600">Ajuda e suporte</div>' +
            '<div class="text-sm text-muted">Converse com o Mentor IA</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<button onclick="App.logout()" style="width:100%;padding:14px 0;border-radius:12px;border:2px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.6);font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;font-family:inherit">Sair da conta</button>' +

    '</div>';
  },
  
  // ─── STUBS (telas futuras) ────────────────────────────
  
  renderAssessment: function() {
    return '<div class="view-enter">' +
      '<button class="btn btn-sm btn-secondary" onclick="Router.back()">← Voltar</button>' +
      '<div class="empty-state mt-xl">' +
        '<div class="empty-state-icon">🎯</div>' +
        '<p class="fw-600">Mapeamento de Competências</p>' +
        '<p class="text-sm text-muted mt-sm">Conecte aqui seu assessment existente</p>' +
      '</div>' +
    '</div>';
  },
  
  renderAcademia: function() {
    var trilha = State.get('trilha') || {};
    var semanas = trilha.semanas || [];
    var user = State.get('user') || {};

    if (semanas.length === 0) {
      return '<div class="view-enter">' +
        '<button class="btn btn-sm btn-secondary" onclick="Router.back()">← Voltar</button>' +
        '<div class="empty-state mt-xl">' +
          '<div class="empty-state-icon">📚</div>' +
          '<p class="fw-600">Trilha de Conteúdo</p>' +
          '<p class="text-sm text-muted mt-sm">Sua trilha ainda não foi montada.</p>' +
        '</div>' +
      '</div>';
    }

    var html = '<div class="view-enter">' +
      '<button class="btn btn-sm btn-secondary" onclick="Router.back()">← Voltar</button>' +
      '<div class="card-title" style="font-size:var(--font-lg);margin:12px 0">Trilha de Conteúdo</div>' +
      '<div class="text-sm text-muted mb-md">' + _esc(semanas[0].competencia || '') + ' — 14 semanas</div>';

    semanas.forEach(function(s) {
      var isConcluido = s.status === 'concluido';
      var isPratica = s.tipo === 'aplicacao';
      var isRevisao = s.tipo === 'revisao';
      var icon = isPratica ? '🎯' : isRevisao ? '📝' : '📖';
      var statusIcon = isConcluido ? '✓' : '';
      var borderColor = isPratica ? 'var(--v-gold)' : isRevisao ? 'var(--v-cyan)' : 'rgba(255,255,255,0.1)';

      html += '<div class="card" style="margin-bottom:8px;padding:12px 14px;border-left:3px solid ' + borderColor + (isConcluido ? ';opacity:0.6' : '') + '">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span style="font-size:16px">' + icon + '</span>' +
          '<div style="flex:1">' +
            '<div style="display:flex;justify-content:space-between;align-items:center">' +
              '<span class="text-xs text-muted">Semana ' + s.semana + (isPratica ? ' — Prática' : isRevisao ? ' — Revisão' : '') + '</span>' +
              (statusIcon ? '<span style="color:var(--v-cyan);font-size:12px">✓ Concluído</span>' : '') +
            '</div>' +
            '<div class="fw-600 text-sm" style="margin-top:2px">' + _esc(s.titulo || s.descritor || '') + '</div>' +
            (s.descritor && !isPratica ? '<div class="text-xs text-muted" style="margin-top:2px">Foco: ' + _esc(s.descritor) + '</div>' : '') +
          '</div>' +
        '</div>' +
        (s.url && s.url.indexOf('http') === 0 ? '<a href="' + s.url + '" target="_blank" class="btn btn-sm btn-outline" style="margin-top:8px;display:inline-block;text-decoration:none">Acessar conteúdo</a>' : '') +
      '</div>';
    });

    html += '</div>';
    return html;
  },
  
  renderPDIDetalhe: function(params) {
    return '<div class="view-enter">' +
      '<button class="btn btn-sm btn-secondary" onclick="Router.go(\'pdi\')">← Voltar ao PDI</button>' +
      '<div class="empty-state mt-xl">' +
        '<div class="empty-state-icon">🔍</div>' +
        '<p class="fw-600">Detalhe da Competência</p>' +
        '<p class="text-sm text-muted mt-sm">Ações, conteúdos e evidências</p>' +
      '</div>' +
    '</div>';
  },
  
  renderResultado: function() {
    var dash = State.get('dashboard') || {};
    var trilha = State.get('trilha') || {};
    var semanas = trilha.semanas || [];
    var concluidas = semanas.filter(function(s) { return s.status === 'concluido'; }).length;
    var pdi = State.get('pdi') || {};
    var comps = pdi.competencias || [];

    return '<div class="view-enter">' +
      '<button class="btn btn-sm btn-secondary" onclick="Router.back()">← Voltar</button>' +
      '<div class="card-title" style="font-size:var(--font-lg);margin:12px 0">Resultado do Ciclo</div>' +

      // Resumo geral
      '<div class="card">' +
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center">' +
          '<div><div style="font-size:24px;font-weight:800;color:var(--v-cyan)">' + comps.length + '</div><div class="text-xs text-muted">Competências</div></div>' +
          '<div><div style="font-size:24px;font-weight:800;color:var(--v-gold)">' + concluidas + '/' + semanas.length + '</div><div class="text-xs text-muted">Semanas</div></div>' +
          '<div><div style="font-size:24px;font-weight:800;color:var(--v-cyan)">' + ((dash.jornada || {}).percentual || 0) + '%</div><div class="text-xs text-muted">Progresso</div></div>' +
        '</div>' +
      '</div>' +

      // Competências com nível
      (comps.length > 0 ? (
        '<div class="section-header"><span class="section-title">Suas competências</span></div>' +
        comps.map(function(c) {
          var stars = '';
          for (var s = 1; s <= 4; s++) stars += s <= c.nivelAtual ? '★' : '☆';
          return '<div class="card" style="margin-bottom:8px;padding:12px 14px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center">' +
              '<div class="fw-600 text-sm">' + _esc(c.nome) + '</div>' +
              '<span style="color:var(--v-gold);font-size:13px">' + stars + '</span>' +
            '</div>' +
            (c.pontosFortes ? '<div class="text-xs text-muted" style="margin-top:4px">' + _esc(c.pontosFortes).substring(0, 100) + '</div>' : '') +
          '</div>';
        }).join('')
      ) : '') +

      // Reavaliação
      '<div class="card mt-md" style="text-align:center;padding:20px">' +
        '<div style="font-size:32px;margin-bottom:8px">🔄</div>' +
        '<div class="fw-600">Reavaliação</div>' +
        '<div class="text-sm text-muted" style="margin-top:4px">Disponível após a semana 16 da trilha.<br>Aqui você verá seu antes × depois.</div>' +
      '</div>' +

    '</div>';
  },
  
  renderComparacao: function() {
    return '<div class="view-enter">' +
      '<button class="btn btn-sm btn-secondary" onclick="Router.back()">← Voltar</button>' +
      '<div class="empty-state mt-xl">' +
        '<div class="empty-state-icon">🔄</div>' +
        '<p class="fw-600">Antes × Agora</p>' +
        '<p class="text-sm text-muted mt-sm">Comparação entre ciclos</p>' +
      '</div>' +
    '</div>';
  },
  
  // ─── HELPERS ──────────────────────────────────────────
  
  _skeleton: function(count) {
    var html = '';
    for (var i = 0; i < count; i++) {
      html += '<div class="card" style="margin-bottom:12px">' +
        '<div style="height:14px;width:60%;background:var(--v-gray-200);border-radius:4px;margin-bottom:8px"></div>' +
        '<div style="height:12px;width:40%;background:var(--v-gray-100);border-radius:4px"></div>' +
      '</div>';
    }
    return html;
  }
};


/**
 * Escape HTML para prevenir XSS
 */
function _esc(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}
</script>
