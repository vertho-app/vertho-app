<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f8f9fa; color: #333; }
  
  h2 { color: #0F2B54; margin-bottom: 6px; font-size: 15px; }
  .subtitle { color: #666; font-size: 12px; margin-bottom: 16px; }
  
  .cargo-section { margin-bottom: 24px; }
  .cargo-title {
    font-size: 13px; font-weight: 700; color: #fff; background: #0F2B54;
    padding: 8px 14px; border-radius: 6px 6px 0 0;
  }
  .cargo-body { background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; padding: 10px; }
  
  .comp-card {
    display: flex; align-items: center; padding: 10px 12px; margin: 4px 0;
    border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .comp-card:hover { border-color: #2471A3; background: #f0f7ff; }
  .comp-card.selected { border-color: #27AE60; background: #e8f5e9; }
  .comp-card.selected .check { background: #27AE60; color: #fff; }
  
  .check {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    margin-right: 12px; font-size: 14px; flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .comp-card.selected .check::after { content: '✓'; }
  
  .comp-id { font-weight: 700; color: #0F2B54; min-width: 45px; font-size: 12px; }
  .comp-nome { font-size: 13px; color: #333; }
  
  .info-bar {
    background: #FFF3E0; border: 1px solid #FFB74D; border-radius: 6px;
    padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #E65100;
  }
  
  .btn-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  .btn {
    padding: 10px 24px; border: none; border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel { background: #e0e0e0; color: #555; }
  .btn-cancel:hover { background: #ccc; }
  .btn-confirm { background: #27AE60; color: #fff; }
  .btn-confirm:hover { background: #219a52; }
  .btn-confirm:disabled { background: #a5d6a7; cursor: not-allowed; }
  
  .loading { text-align: center; padding: 40px; color: #888; }
  .error { background: #ffebee; color: #c62828; padding: 12px; border-radius: 6px; margin: 10px 0; }
</style>
</head>
<body>

<div id="loading" class="loading">Carregando competências...</div>
<div id="content" style="display:none">
  <h2>Competência do Quadrimestre</h2>
  <p class="subtitle">Selecione 1 competência por cargo. Nível 1-2 fará esta. Nível 3-4 fará a de maior gap.</p>
  
  <div class="info-bar">
    ⚠️ Selecione <strong>exatamente 1 competência</strong> por cargo para continuar.
  </div>
  
  <div id="cargos"></div>
  
  <div class="btn-bar">
    <button class="btn btn-cancel" onclick="google.script.host.close()">Cancelar</button>
    <button class="btn btn-confirm" id="btnConfirm" disabled onclick="confirmar()">Criar Sessões</button>
  </div>
</div>
<div id="errorBox" style="display:none"></div>

<script>
var dadosCargos = [];
var selecao = {}; // { cargoKey: "C023" }

google.script.run
  .withSuccessHandler(function(data) {
    dadosCargos = data;
    renderCargos();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  })
  .withFailureHandler(function(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorBox').className = 'error';
    document.getElementById('errorBox').textContent = 'Erro: ' + err.message;
  })
  .carregarDadosSeletorFase3();

function renderCargos() {
  var container = document.getElementById('cargos');
  container.innerHTML = '';
  
  dadosCargos.forEach(function(cargo) {
    var section = document.createElement('div');
    section.className = 'cargo-section';
    
    var title = document.createElement('div');
    title.className = 'cargo-title';
    title.textContent = cargo.cargoDisplay;
    section.appendChild(title);
    
    var body = document.createElement('div');
    body.className = 'cargo-body';
    
    cargo.competencias.forEach(function(comp) {
      var card = document.createElement('div');
      card.className = 'comp-card';
      card.dataset.cargo = cargo.cargoKey;
      card.dataset.compId = comp.id;
      
      if (selecao[cargo.cargoKey] === comp.id) {
        card.className += ' selected';
      }
      
      card.onclick = function() {
        // Toggle seleção (1 por cargo)
        if (selecao[cargo.cargoKey] === comp.id) {
          delete selecao[cargo.cargoKey];
        } else {
          selecao[cargo.cargoKey] = comp.id;
        }
        renderCargos(); // re-render
        updateBtn();
      };
      
      var check = document.createElement('div');
      check.className = 'check';
      card.appendChild(check);
      
      var idSpan = document.createElement('span');
      idSpan.className = 'comp-id';
      idSpan.textContent = comp.id;
      card.appendChild(idSpan);
      
      var nomeSpan = document.createElement('span');
      nomeSpan.className = 'comp-nome';
      nomeSpan.textContent = '  ' + comp.nome;
      card.appendChild(nomeSpan);
      
      body.appendChild(card);
    });
    
    section.appendChild(body);
    container.appendChild(section);
  });
}

function updateBtn() {
  var totalCargos = dadosCargos.length;
  var totalSelecionados = Object.keys(selecao).length;
  var btn = document.getElementById('btnConfirm');
  btn.disabled = (totalSelecionados < totalCargos);
}

function confirmar() {
  var btn = document.getElementById('btnConfirm');
  btn.disabled = true;
  btn.textContent = 'Criando sessões...';
  
  google.script.run
    .withSuccessHandler(function(resultado) {
      google.script.host.close();
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = 'Criar Sessões';
      alert('Erro: ' + err.message);
    })
    .executarCriacaoSessoesFase3(selecao);
}
</script>
</body>
</html>
